<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var t=localStorage.getItem('digifund-theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
    <title>Chi Tiết Sản Phẩm - Digifund</title>
    <meta name="description" content="Chi tiết sản phẩm & vật liệu bán dẫn của Digifund: silicon wafer, substrate, bia phún xạ (sputtering target), thiết bị phòng sạch, hoá chất — thông số kỹ thuật đầy đủ, báo giá theo yêu cầu.">
    <meta name="keywords" content="silicon wafer, substrate, wafer bán dẫn, bia phún xạ, sputtering target, SiC wafer, GaAs wafer, thiết bị phòng sạch, hoá chất bán dẫn, Digifund">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="author" content="Digifund">
    <meta name="theme-color" content="#2563eb">
    <link rel="canonical" href="https://digifund.vn/product-detail.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Digifund">
    <meta property="og:locale" content="vi_VN">
    <meta property="og:title" content="Chi Tiết Sản Phẩm & Vật Liệu Bán Dẫn | Digifund">
    <meta property="og:description" content="Silicon wafer, substrate, bia phún xạ, thiết bị phòng sạch & hoá chất bán dẫn — thông số kỹ thuật đầy đủ.">
    <meta property="og:image" content="https://digifund.vn/assets/images/logo-2.png">
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="apple-touch-icon" href="./favicon.png">
    <link href="./assets/fonts/google-archivo.css" rel="stylesheet">
    <link href="./assets/fonts/google-titillium.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/product-detail.css">
</head>
<body>
    <!--Start Preloader-->
    <div id="site-preloader" class="js-preloader" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#ffffff;">
        <img src="./assets/images/logo-2.png" alt="Digifund" style="width:170px;height:auto;animation:sitePreloaderPulse 1.4s ease-in-out infinite;">
    </div>
    <style>@keyframes sitePreloaderPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.94)}}</style>
    <script>(function(){function hide(){var p=document.getElementById('site-preloader');if(!p)return;p.style.transition='opacity .45s ease';p.style.opacity='0';setTimeout(function(){p.style.display='none';},450);}if(document.readyState==='complete'){setTimeout(hide,300);}else{window.addEventListener('load',function(){setTimeout(hide,300);});}setTimeout(hide,6000);})();</script>
    <!--End Preloader-->

    <header class="pdp-top">
        <a class="pdp-top__logo" href="./" aria-label="Digifund"><img src="./assets/images/logo-2.png" alt="Digifund"><span class="pdp-top__name">DIGIFUND</span></a>
        <div class="pdp-top__right">
            <a class="pdp-back" href="./#products"><i class="fas fa-arrow-left"></i> <span id="tBack">Về trang chủ</span></a>
            <button class="pdp-toggle" id="langToggle" title="EN/VI">VI</button>
            <button class="pdp-toggle" id="themeToggle" title="Sáng/Tối"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <section class="pdp-hero">
        <div class="pdp-hero__wafer"></div>
        <p class="pdp-hero__crumb">
            <a href="./" id="tHome">Trang chủ</a> ›
            <a href="./#products" id="tAllProd">Tất cả sản phẩm</a> ›
            <span id="heroCrumb"></span>
        </p>
        <span class="pdp-hero__badge" id="heroBadge"></span>
        <h1 class="pdp-hero__title" id="heroTitle"></h1>
        <p class="pdp-hero__intro" id="heroIntro"></p>
    </section>

    <main class="pdp-main" id="pdpBody">
        <div class="pdp-layout">
            <aside class="pdp-nav" id="pdpNav"></aside>
            <div class="pdp-content" id="pdpContent"></div>
        </div>
    </main>

    <footer class="pdp-foot">
        <!-- © 2026 Digifund. --><a href="./" id="tFootBack">Về trang chủ</a>
    </footer>

    <!-- Product detail modal -->
    <div class="pdm-overlay" id="pdmOverlay" role="dialog" aria-modal="true">
        <div class="pdm-box">
            <button class="pdm-close" id="pdmClose" aria-label="Close">&times;</button>
            <div class="pdm-grid" id="pdmGrid"></div>
        </div>
    </div>

    <script src="./assets/js/products-data.js"></script>
    <script src="./assets/js/product-detail-engine.js"></script>
</body>
</html>
